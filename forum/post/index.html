<!DOCTYPE html> 
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>BEGAN Partner Board</title>

    <link rel="stylesheet"
        href="https://pwa.barkahgarment.com/forum/post/post.css">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body>
    <nav id="began-global-nav">

  <div class="began-nav-inner">

    <div class="began-brand">

      <img
        src="https://pwa.barkahgarment.com/assets/logo%20font(1000%20x%20381%20px).png"
        alt="BEGAN"
      >

      <span>
        Exclusive Partner Access
      </span>

    </div>

    <div class="began-nav-links">

      <button
        class="began-nav-link"
        data-global-nav="dashboard">

        Dashboard

      </button>

      <button
        class="
          began-nav-link
          active
        "
        data-global-nav="forum">

        Partner Board

      </button>

      <button
        class="began-nav-link"
        data-global-nav="updates">

        Updates

      </button>

      <button
        class="began-nav-link"
        data-global-nav="reserve">

        Produk Reserve

      </button>

    </div>

  </div>

</nav>
   <nav id="began-mobile-nav">

  <button
    data-mobile-nav="dashboard">

    <i data-lucide="layout-dashboard"></i>
    <span>Dashboard</span>

  </button>

  <button
    class="active"
    data-mobile-nav="forum">

    <i data-lucide="message-circle"></i>
    <span>Forum</span>

  </button>

  <button
    data-mobile-nav="updates">

    <i data-lucide="bell"></i>
    <span>Notifikasi</span>

  </button>

  <button
    data-mobile-nav="reserve">

    <i data-lucide="package"></i>
    <span>Produk Reserve</span>

  </button>

</nav>
   <div id="began-mobile-header">

  <button
    class="began-mobile-back-btn"
    onclick="
      BeganDeepLink.open(
        '/forum/'
      );
    "
  >

    <img

      src="
https://pwa.barkahgarment.com/assets/arrow%20left%20(1000%20x%20692%20px)%20(1).png
      "

      class="
        began-mobile-back-icon
      "

      alt="Back"
    >

  </button>

  <img
    src="
https://pwa.barkahgarment.com/assets/logo%20font(1000%20x%20381%20px).png
    "
    alt="BEGAN"
  >

  <div class="began-mobile-brand">

    <div
      class="
        began-mobile-tagline
      "
    >

      UNTIL GOD SAYS SO

    </div>

    <div
      class="
        began-mobile-subtag
      "
    >

      Established in Heaven

    </div>

  </div>

</div>
    <div id="post-page"></div>

    <script src="https://pwa.barkahgarment.com/deeplink.js"></script>
     <script src="https://pwa.barkahgarment.com/core-dashboard-pwa-bridge.js"></script>
    <script defer src="https://pwa.barkahgarment.com/forum/forum-dev.js?v=5"></script>

<script defer src="https://pwa.barkahgarment.com/forum/forum-auth.js?v=5"></script>

<script defer src="https://pwa.barkahgarment.com/forum/forum-api.js?v=5"></script>

    <script defer src="https://pwa.barkahgarment.com/forum/forum-mention.js?v=5"></script>

<script defer src="https://pwa.barkahgarment.com/forum/post/post-render.js?v=5"></script>

<script defer src="https://pwa.barkahgarment.com/forum/post/post-replies.js?v=5"></script>

<script defer src="https://pwa.barkahgarment.com/forum/post/post.js?v=5"></script>

</body>

</html>
